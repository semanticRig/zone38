<svg xmlns="http://www.w3.org/2000/svg" width="480" height="160" viewBox="0 0 480 160" role="img">
  <title>zone38</title>
  <desc>zone38 logo — IC threshold curve with wordmark, dark variant</desc>

  <!-- Grid lines -->
  <g stroke="#e8e8e8" stroke-width="0.4" opacity="0.07">
    <line x1="28" y1="28" x2="28" y2="132"/>
    <line x1="68" y1="28" x2="68" y2="132"/>
    <line x1="108" y1="28" x2="108" y2="132"/>
    <line x1="148" y1="28" x2="148" y2="132"/>
    <line x1="28" y1="48" x2="152" y2="48"/>
    <line x1="28" y1="68" x2="152" y2="68"/>
    <line x1="28" y1="88" x2="152" y2="88"/>
    <line x1="28" y1="108" x2="152" y2="108"/>
    <line x1="28" y1="128" x2="152" y2="128"/>
  </g>

  <!-- Axes -->
  <line x1="28" y1="28" x2="28" y2="134" stroke="#e8e8e8" stroke-width="0.8" opacity="0.2"/>
  <line x1="28" y1="134" x2="152" y2="134" stroke="#e8e8e8" stroke-width="0.8" opacity="0.2"/>

  <!-- Human language IC curve (dashed, muted) -->
  <path d="M30 54 Q55 58 80 68 Q105 80 128 100 Q138 112 148 128"
        fill="none" stroke="#e8e8e8" stroke-width="1.2" stroke-dasharray="3 3" opacity="0.2"/>

  <!-- Cryptographic IC curve (solid, red) -->
  <path d="M30 118 Q70 116 110 114 Q130 113 148 112"
        fill="none" stroke="#e74c3c" stroke-width="1.4" opacity="0.9"/>

  <!-- Zone38 threshold line -->
  <line x1="26" y1="112" x2="150" y2="112" stroke="#e74c3c" stroke-width="0.7" stroke-dasharray="2 3" opacity="0.65"/>

  <!-- Danger zone fill -->
  <rect x="28" y="112" width="120" height="20" fill="#e74c3c" opacity="0.08"/>

  <!-- Axis labels -->
  <text x="22" y="57" font-family="monospace" font-size="7" fill="#e8e8e8" opacity="0.4" text-anchor="end">0.065</text>
  <text x="22" y="115" font-family="monospace" font-size="7" fill="#e74c3c" opacity="0.9" text-anchor="end">0.038</text>

  <!-- Zone label inside danger band -->
  <text x="88" y="125" font-family="monospace" font-size="7" fill="#e74c3c" opacity="0.75" text-anchor="middle">zone38</text>

  <!-- Wordmark -->
  <text x="172" y="108"
        font-family="monospace"
        font-size="62"
        font-weight="500"
        fill="#f0f0f0"
        letter-spacing="-1">zone38</text>

  <!-- Tagline -->
  <text x="174" y="128"
        font-family="monospace"
        font-size="10"
        fill="#f0f0f0"
        opacity="0.4"
        letter-spacing="0.3">below 0.038, nothing is innocent</text>

  <!-- Red accent tick -->
  <rect x="172" y="134" width="3" height="1.5" fill="#e74c3c" rx="0.5"/>
</svg>
